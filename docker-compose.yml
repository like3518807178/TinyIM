services:
  mysql:
    image: mysql:8.4
    container_name: tinyim-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tinyim
      MYSQL_USER: tinyim
      MYSQL_PASSWORD: tinyim123
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

volumes:
  mysql_data:
